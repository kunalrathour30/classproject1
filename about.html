<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aside Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            max-width: 800px;
            margin: 20px auto;
        }
        main {
            flex: 3;
            padding: 10px;
            background: #f4f4f4;
        }
        aside {
            flex: 1;
            padding: 10px;
            background: #ddd;
            margin-left: 10px;
        }
    </style>
</head>
<body>

    <main>
        <h1>Main Content</h1>
        <p>This is the main article of the page. The `<aside>` element is used for additional information, like related links or ads.</p>
    </main>

    <aside>
        <h2>Related Articles</h2>
        <ul>
            <li><a href="#">HTML Basics</a></li>
            <li><a href="#">CSS Styling</a></li>
            <li><a href="#">JavaScript Introduction</a></li>
        </ul>
    </aside>

</body>
</html>
