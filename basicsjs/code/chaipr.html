<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JavaScript Background Color Switcher</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="m-0">

  <nav class="flex gap-6 p-4 bg-gray-900 text-white">
    <a href="/" class="hover:underline">Home</a>
    <a 
      target="_blank"
      href="https://www.youtube.com/@chaiaurcode"
      class="hover:underline"
    >
      Youtube channel
    </a>
  </nav>

  <div class="w-4/5 mx-auto my-24 text-center">
    
    <h1 class="text-3xl font-bold mb-8">Color Scheme Switcher</h1>

    <div class="flex justify-center gap-6 mb-8 " id="button">
      <span id="grey" class="w-24 h-24 border-2 border-black bg-gray-500 cursor-pointer"></span>
      <span id="white" class="w-24 h-24 border-2 border-black bg-white cursor-pointer"></span>
      <span id="blue" class="w-24 h-24 border-2 border-black bg-blue-500 cursor-pointer"></span>
      <span id="yellow" class="w-24 h-24 border-2 border-black bg-yellow-400 cursor-pointer"></span>
    </div>

    <h2 class="text-xl">
      Try clicking on one of the colors above
      <span class="block text-gray-700">to change the background color of this page!</span>
    </h2>
  </div>

  <script src="chaipr.js"></script>
</body>
</html>
