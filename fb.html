<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Facebook</title>
  <link rel="stylesheet" href="fb.css">
</head>
<body>
  <header class="header">
    <div class=" logo">facebook</div>
  </header>
  <main class="main-content">
    <section class="login-section">
      <h1>Connect with friends and the world around you on Facebook.</h1>
      <form class="login-form">
        <input type="email" placeholder="Email or Phone" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Log In</button>
        <a href="#" class="forgot-password">Forgotten password?</a>
        <hr>
        <button type="button" class="create-account">Create New Account</button>
      </form>
    </section>
    <aside class="info-section">
      <p><strong>Facebook</strong> helps you connect and share with the people in your life.</p>
    </aside>
  </main>
  <footer class="footer">
    <p>Facebook &copy; 2025</p>
  </footer>
</body>
</html>
