<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Document</title>
    <link rel="stylesheet" href="output.css">
</head>
<body class="bg-blue-400 text-center flex items-center justify-center h-screen">
    <div class="bg-white p-6 rounded-b-lg max-w-md w-full">
        <div>
            <div>
                <h1 class=" text-4xl  text-center text-gray-800 ">
                    Feedback Form
                </h1>
                <form action="">
                    <label class="block text-gray-800 font-semibold mb-2 " for="Full Name"> Full Name</label>
                    <input class="w-full border rounded-lg  focus:ring-2 focus:ring-red-600 focus:border-transparent" type="text" placeholder="Enter name">
                <div>
                    <label class="block text-gray-800 font-semibold mb-2 for="">Email:</label>
                    <input class="w-full border rounded-lg focus:ring-2 focus:ring-red-600 focus:border-transparent" type="email" placeholder="Enter email">

                </div>
                <div>
                    <label class="block text-gray-800 font-semibold mb-2">Rating</label>
                    <select class="w-full border rounded-lg" name=" " id="">
                        <option value="">select Rating</option>
                        <option value="">5 stars</option>
                        <option value="">4 stars</option>
                    </select>
                </div>
                <div>
                    <label class="block text-gray-800 text-sm font-semibold mb-2">
                        <textarea  class="w-full border rounded-b-lg h-32"  name="" id="" placeholder="Share your thoughts">

                        </textarea>
                    </label>
                </div>
                <div>
                    <label class="block text-gray-800 text-sm font-semibold mb-2">Upload File</label>
                    <input type="file">



                </div>
            </div>
        </div>
        
    </div>
